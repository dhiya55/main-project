{% extends 'tracker/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register - EcoTrack Vision{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-5">
                <div class="text-center mb-5">
                    <h3 class="font-weight-bold">Join the Movement</h3>
                    <p class="text-muted">Create an account and start tracking</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-premium btn-lg">Create Account</button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted">Already have an account? <a href="{% url 'login' %}"
                            class="text-primary text-decoration-none">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
